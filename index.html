<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script src="https://kit.fontawesome.com/808ac7b3e4.js" crossorigin="anonymous"></script>
</head>
<body>

    <h1>My To-Do List</h1>

    <main>
        
        <section class="input-section">
            
            <p>Nueva Tarea</p>
            
            <div class="input">
                <input type="text" id="nueva-tarea" placeholder="Ej: Hacer mercado">
                <button id="btn-agregar">Agregar tarea</button>
            </div>
            
        </section>

        <section id="tareas-container">
        </section>

        <section class="tareas-totales">

            <div class="suma">
                <p>Total de tareas <span id="total-tareas"></span></p>
                <p>Tareas realizadas <span id="total-realizadas"></span></p>
                <p>Tareas pendientes <span id="total-pendiente"></span></p>
            </div>

        </section>

        
    </main>







    <script src="./assets/js/script.js"></script>
</body>
</html>
